<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPO Intelligence</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .index-header { margin-bottom: 2rem; }
  .index-header h1 { font-size: 28px; font-weight: 700; }
  .index-header p { color: #666; font-size: 14px; margin-top: 6px; }
  .verdict-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot-pursuing { background: #22c55e; }
  .dot-monitor  { background: #eab308; }
  .dot-low      { background: #94a3b8; }
</style>
</head>
<body>

<nav class="topnav">
  <span class="topnav-brand">CPO Intel</span>
</nav>

<div class="layout">
  <div class="index-header">
    <h1>CPO Research</h1>
    <p>Select a company to view the full profile.</p>
  </div>
  <div class="cpo-grid" id="grid"></div>
</div>

<script>
const VERDICT_META = {
  "worth pursuing": { cls: "dot-pursuing", label: "Worth pursuing" },
  "monitor":        { cls: "dot-monitor",  label: "Monitor" },
  "low priority":   { cls: "dot-low",      label: "Low priority" }
};

const TAG_STYLE_MAP = {
  cpo: "b-cpo", pub: "b-pub", eu: "b-eu", signal: "b-signal", tech: "b-tech", low: "b-low"
};

async function init() {
  const res = await fetch('data/manifest.json');
  const manifest = await res.json();
  const grid = document.getElementById('grid');

  for (const item of manifest) {
    const data = await fetch(`data/${item.slug}.json`).then(r => r.json());
    const vm = VERDICT_META[data.synthesis.verdict] || { cls: "dot-monitor", label: data.synthesis.verdict };
    const initials = item.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

    const card = document.createElement('a');
    card.className = 'cpo-card';
    card.href = `profile.html?cpo=${item.slug}`;
    card.innerHTML = `
      <div class="cpo-card-logo">${initials}</div>
      <div class="cpo-card-name">${item.name}</div>
      <div class="cpo-card-sub">${item.country} · ${data.type}</div>
      <div class="badges" style="margin-bottom:10px">
        ${data.tags.map((t,i) => `<span class="badge ${TAG_STYLE_MAP[data.tagStyles[i]] || 'b-eu'}">${t}</span>`).join('')}
      </div>
      <div style="font-size:12px;color:#555">
        <span class="verdict-dot ${vm.cls}"></span>${vm.label}
      </div>`;
    grid.appendChild(card);
  }
}

init();
</script>
</body>
</html>
